name: AI OSS Radar Daily Digest

on:
  schedule:
    # 08:00 America/Toronto during daylight saving time.
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore radar state
        id: restore-state
        uses: actions/cache/restore@v4
        with:
          path: data/seen_repos.json
          key: radar-seen-${{ github.run_id }}
          restore-keys: |
            radar-seen-

      - name: Run radar and send Gmail digest
        env:
          RADAR_EMAIL_TO: ${{ secrets.RADAR_EMAIL_TO }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RADAR_EMAIL_FROM: ${{ secrets.SMTP_USER }}
          RADAR_EMAIL_SUBJECT_PREFIX: "[AI OSS Radar]"
          GITHUB_TOKEN: ${{ secrets.GH_SEARCH_TOKEN || github.token }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python -m unittest discover -s tests
          python run_and_notify.py \
            --days 7 \
            --max-items 25 \
            --per-query 12 \
            --hn-per-query 15 \
            --readme-limit 6 \
            --require-email

      - name: Save radar state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/seen_repos.json
          key: radar-seen-${{ github.run_id }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radar-reports
          path: |
            reports/latest.md
            reports/*-ai-oss-radar.md
            reports/last_email.txt
            data/raw/*.json
          if-no-files-found: warn
          retention-days: 14
